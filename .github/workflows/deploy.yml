name: Deploy pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./MaratonaSlides
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4

      # Instala o pnpm oficialmente na mesma versão que você usa na sua máquina
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # Configura o Node e ativa o cache otimizado para a sua subpasta
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
          cache-dependency-path: './MaratonaSlides/pnpm-lock.yaml'

      # Instala as dependências respeitando estritamente o seu lockfile e permissões
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # --- Início dos Builds Múltiplos (Substituído npx por pnpm exec) ---
       
      - name: Build Index (Raiz)
        run: pnpm exec slidev build index.md --out dist --base /${{github.event.repository.name}}/

      - name: Build Aula 0
        run: pnpm exec slidev build aula0.md --out dist/aula0 --base /${{github.event.repository.name}}/aula0/

      - name: Build Aula 1
        run: pnpm exec slidev build aula1.md --out dist/aula1 --base /${{github.event.repository.name}}/aula1/

      - name: Build Aula 2
        run: pnpm exec slidev build aula2.md --out dist/aula2 --base /${{github.event.repository.name}}/aula2/

      - name: Build Aula 3
        run: pnpm exec slidev build aula3.md --out dist/aula3 --base /${{github.event.repository.name}}/aula3/

      - name: Build Aula 4
        run: pnpm exec slidev build aula4.md --out dist/aula4 --base /${{github.event.repository.name}}/aula4/

      - name: Build Aula 5
        run: pnpm exec slidev build aula5.md --out dist/aula5 --base /${{github.event.repository.name}}/aula5/

      - name: Build Aula 6
        run: pnpm exec slidev build aula6.md --out dist/aula6 --base /${{github.event.repository.name}}/aula6/

      - name: Build Aula 7
        run: pnpm exec slidev build aula7.md --out dist/aula7 --base /${{github.event.repository.name}}/aula7/

      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./MaratonaSlides/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4