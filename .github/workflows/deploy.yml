name: Deploy pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./MaratonaSlides
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup @antfu/ni
        run: npm i -g @antfu/ni

      - name: Install dependencies
        run: nci

      # --- Início dos Builds Múltiplos ---
       
      - name: Build Index (Raiz)
        run: npx slidev build index.md --out dist --base /${{github.event.repository.name}}/

      - name: Build Aula 0
        run: npx slidev build aula0.md --out dist/aula0 --base /${{github.event.repository.name}}/aula0/

      - name: Build Aula 1
        run: npx slidev build aula1.md --out dist/aula1 --base /${{github.event.repository.name}}/aula1/

      - name: Build Aula 2
        run: npx slidev build aula2.md --out dist/aula2 --base /${{github.event.repository.name}}/aula2/

      - name: Build Aula 3
        run: npx slidev build aula3.md --out dist/aula3 --base /${{github.event.repository.name}}/aula3/

      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./MaratonaSlides/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4